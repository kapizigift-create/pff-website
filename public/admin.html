<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — PFF CMS</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; justify-content: center; align-items: center;
      height: 100vh; background: #0a1f3f; font-family: 'Segoe UI', sans-serif;
    }
    .box {
      text-align: center; color: white; background: #132d5c;
      padding: 40px; border-radius: 8px; max-width: 400px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #c8963e; margin-bottom: 24px; }
    button {
      background: #c8963e; color: white; border: none;
      padding: 14px 36px; font-size: 16px; border-radius: 4px;
      cursor: pointer; font-weight: bold;
    }
    button:hover { background: #b8862c; }
    a { color: #c8963e; }
  </style>
</head>
<body>
  <div class="box" id="app">
    <h1>People First Foundation</h1>
    <p>Content Management System</p>
    <button onclick="netlifyIdentity.open('login')">Log In / Sign Up</button>
  </div>

  <script>
    netlifyIdentity.init();
    netlifyIdentity.on("init", user => {
      if (user) {
        document.getElementById("app").innerHTML = `
          <h2>You're logged in!</h2>
          <p><a href="/admin/">Go to CMS</a></p>
        `;
      }
    });
  </script>
</body>
</html>
