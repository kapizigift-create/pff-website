<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager — People First Foundation</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .admin-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0a1f3f;
      color: white;
      font-family: 'Montserrat', sans-serif;
    }
    .admin-loader h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .admin-loader p {
      color: #c8963e;
      font-size: 1rem;
    }
    .admin-loader .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #c8963e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="admin-loader">
    <h1>People First Foundation</h1>
    <p>Content Management System</p>
    <div class="spinner"></div>
    <p style="font-size:0.8rem; margin-top:1rem; color:rgba(255,255,255,0.6);">Loading editor...</p>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
